schema_version: 1

context:
  name: google-ads
  version: "30.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/google_ads-${{ version }}.tar.gz
  sha256: beecd95690cbb5fff728d5455f67588f0af12aec1fb3c54ad373a5a57716e9f4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-auth-oauthlib >=1.0.0,<2.0.0
    # strictest constraint for python >=3.13
    - google-api-core >=2.22.0,<=3.0.0
    # strictest constraint for python >=3.13
    - googleapis-common-protos >=1.63.2,<2.0.0
    # strictest constraint for python >=3.14
    - grpcio >=1.75.1,<2.0.0
    # strictest constraint for python >=3.14
    - grpcio-status >=1.75.1,<2.0.0
    # strictest constraint for python >=3.13
    - proto-plus >=1.25.0,<2.0.0
    - pyyaml >=5.1,<7.0
    # strictest lower bound for python >=3.13; upper bound from python >=3.10
    - protobuf >=5.26.1,<8.0.0

tests:
  - python:
      imports:
        - google
        - google.ads
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Client library for the Google Ads API
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleads/google-ads-python
  repository: https://github.com/googleads/google-ads-python
  documentation: https://developers.google.com/google-ads/api/docs/start

extra:
  recipe-maintainers:
    - xylar
